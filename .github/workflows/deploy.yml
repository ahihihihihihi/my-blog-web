name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 */3 * * *' # Tự động húp bài mỗi 3 tiếng
  workflow_dispatch:      # Nút bấm thủ công cho bạn hiền

permissions:
  contents: read
  pages: write
  id-token: write

# ÉP HỆ THỐNG DÙNG NODE 24 ĐỂ KHÔNG BÁO LỖI NỮA
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" # CHIỀU THEO Ý GITHUB: DÙNG NODE 24
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build with Next.js
        run: npm run build
        env:
          VITE_BLOGGER_ID: ${{ secrets.VITE_BLOGGER_ID }}
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4